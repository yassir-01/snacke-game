<!DOCTYPE html>
<html>
<head>
<title>Yassir Snake Game</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>

<body>

<h1>🐍 Yassir Snake Game</h1>

<div class="menu">
  <select id="level">
    <option value="150">Easy</option>
    <option value="100">Medium</option>
    <option value="60">Hard</option>
  </select>
  <button onclick="startGame()">Start Game</button>
  <button onclick="restartGame()">Restart</button>
</div>

<div class="score">
Score: <span id="score">0</span>
</div>

<canvas id="game"></canvas>

<div class="mobile-controls">
  <button class="up" onclick="setDirection('up')">⬆️</button>
  <div class="middle-row">
    <button class="left" onclick="setDirection('left')">⬅️</button>
    <button class="down" onclick="setDirection('down')">⬇️</button>
    <button class="right" onclick="setDirection('right')">➡️</button>
  </div>
</div>
<script src="snake.js"></script>
</body>
</html>
