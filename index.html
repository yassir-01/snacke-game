<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Yassir Snake Game</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>🐍 Yassir Snake Game</h1>

<div class="menu">

<select id="difficulty">
<option value="150">Easy</option>
<option value="100">Medium</option>
<option value="70">Hard</option>
</select>

<button onclick="startGame()">Start Game</button>
<button onclick="restartGame()">Restart</button>

</div>

<div class="scoreboard">

Score: <span id="score">0</span>

Highscore: <span id="highscore">0</span>

</div>

<canvas id="game"></canvas>

<div class="controls">

<button onclick="changeDirection('up')">⬆️</button>

<div class="row">

<button onclick="changeDirection('left')">⬅️</button>

<button onclick="changeDirection('down')">⬇️</button>

<button onclick="changeDirection('right')">➡️</button>

</div>

</div>

<script src="snake.js"></script>

</body>

</html>
